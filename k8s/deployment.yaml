apiVersion: apps/v1
kind: Deployment
metadata:
  name: counter-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: counter-app
  template:
    metadata:
      labels:
        app: counter-app
    spec:
      containers:
      - name: counter-app
        image: docker.io/taojie1/counter-app:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        envFrom:
          - configMapRef:
              name: counter-config
